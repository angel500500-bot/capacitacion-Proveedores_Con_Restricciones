<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, shrink-to-fit=no">
<title>Código de Conducta para Proveedores de Roche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<script src="scorm.js"></script>
<style>
  :root{
    --ink:#122036;--muted:#586a86;--line:#e0e7f1;--paper:#eef2f8;--card:#fff;
    --theme:#0093D0;--theme-soft:#e2f4fb;--good:#1f9d6b;--bad:#e0574f;--warn:#e0912f;
    --shadow:0 16px 44px -22px rgba(18,32,54,.32);--r:18px;
    --sans:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    --display:"Fraunces",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden}
  .app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .cprog{height:4px;background:#d7e0ee;flex:0 0 auto}
  .cprog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--theme),#7fd3ff);transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .topmenu{display:flex;align-items:stretch;background:var(--card);border-bottom:1px solid var(--line);flex:0 0 auto;position:relative;z-index:5}
  .brandmini{display:flex;align-items:center;gap:9px;padding:8px 16px;border-right:1px solid var(--line);flex:0 0 auto}
  .brandmini .m{width:32px;height:32px;border-radius:9px;background:linear-gradient(145deg,#1c5dd1,#1547a6);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:17px}
  .brandmini b{font-size:12.5px;line-height:1.1;color:var(--ink)} .brandmini small{display:block;font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:700}
  .mitems{display:flex;flex:1;min-width:0}
  .mitem{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:13px 10px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;position:relative;border-right:1px solid var(--line);transition:color .2s,background .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mitem:last-child{border-right:none}
  .mitem .mc{width:19px;height:19px;border-radius:50%;border:2px solid #c7d3e6;display:grid;place-items:center;flex:0 0 auto;transition:.2s}
  .mitem .mc svg{width:11px;height:11px;opacity:0;color:#fff;transition:.2s}
  .mitem.done .mc{background:var(--good);border-color:var(--good)} .mitem.done .mc svg{opacity:1}
  .mitem.active{color:#fff} .mitem.active::before{content:"";position:absolute;inset:6px 6px;border-radius:9px;background:var(--am);z-index:-1}
  .mitem.active .mc{border-color:rgba(255,255,255,.8)} .mitem.active.done .mc{background:#fff;border-color:#fff} .mitem.active.done .mc svg{color:var(--am)}
  .mitem.locked{cursor:not-allowed;color:#aeb9ca} .mitem.locked .lock{display:inline-flex} .mitem .lock{display:none;color:#aeb9ca}
  .mitem.nav:not(.locked):not(.active):hover{background:#f4f7fc;color:var(--ink)}
  .band{height:8px;background:linear-gradient(90deg,var(--theme),color-mix(in srgb,var(--theme) 55%,#fff));flex:0 0 auto;transition:background .35s}
  .stage{flex:1 1 auto;position:relative;min-height:0}
  .scene{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;visibility:hidden;transform:translateY(12px);transition:opacity .38s,transform .38s}
  .scene.active{opacity:1;visibility:visible;transform:none}
  .panel{margin:0 auto;width:100%;max-width:1120px;min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:12px clamp(14px,2.6vw,30px) 16px;position:relative;z-index:1}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .pad{padding:clamp(14px,2vw,24px) clamp(18px,2.4vw,34px)}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--theme);background:var(--theme-soft);padding:7px 13px;border-radius:99px;margin-bottom:14px}
  h1.t{font-family:var(--display);font-weight:600;font-size:clamp(27px,3.4vw,42px);line-height:1.06;margin:.08em 0;letter-spacing:-.01em}
  h2.t{font-family:var(--display);font-weight:600;font-size:clamp(23px,2.9vw,34px);line-height:1.1;margin:.05em 0}
  .tbar{width:60px;height:5px;border-radius:99px;background:var(--theme);margin:10px 0 14px}
  .lead{font-size:clamp(15.5px,1.55vw,18px);color:var(--muted);line-height:1.62;max-width:66ch}
  p.body{font-size:clamp(15px,1.5vw,17px);line-height:1.72;color:#33415c;max-width:66ch}
  .split{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(16px,2.4vw,26px);align-items:center}
  .split.rev{grid-template-columns:.95fr 1.05fr}
  .media{position:relative;border-radius:16px;overflow:hidden;min-height:clamp(160px,30vh,270px);background:linear-gradient(140deg,var(--theme),color-mix(in srgb,var(--theme) 40%,#0a2540));box-shadow:var(--shadow);display:flex;align-self:stretch}
  .media img{width:100%;height:100%;object-fit:cover;display:block}
  .media .phlabel{display:none;position:absolute;inset:0;align-items:center;justify-content:center;text-align:center;color:#fff;font-size:12px;font-weight:700;padding:16px}
  .media.noimg img{display:none}.media.noimg{align-items:center;justify-content:center}.media.noimg .phlabel{display:flex;flex-direction:column;gap:6px}.media.noimg .phlabel::before{content:"🖼";font-size:26px}
  .hero{background:linear-gradient(155deg,#13284b,#0c1b33);color:#fff}
  .hero .kicker{background:rgba(255,255,255,.12);color:#cfe0ff}
  .hero h1.t,.hero h2.t{color:#fff}.hero .lead{color:#c9d8f2}
  .hero .media{min-height:clamp(170px,28vh,270px)}
  .hero .media.contain{background:transparent;box-shadow:none}.hero .media.contain img{object-fit:contain}
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:99px;font-weight:600;font-size:13.5px}
  .chip svg{width:15px;height:15px;color:#7fd3ff}
  .seq{display:grid;gap:13px}
  .obj{display:flex;gap:13px;align-items:flex-start;opacity:0;transform:translateX(-8px);transition:.5s;padding:2px 0}
  .obj.in{opacity:1;transform:none}
  .obj .ic{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--theme-soft);color:var(--theme);display:grid;place-items:center;margin-top:1px}
  .obj .ic svg{width:16px;height:16px}.obj p{margin:0;font-size:clamp(15px,1.5vw,17px);line-height:1.55}
  .obj p strong{color:var(--ink);font-weight:800}
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pill{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);min-height:clamp(200px,32vh,290px);cursor:pointer;box-shadow:var(--shadow);background:#0c1b33}
  .pill .pf{position:absolute;inset:0;transition:opacity .5s}
  .pill .pf img{width:100%;height:100%;object-fit:cover}
  .pill .pf .lab{position:absolute;left:0;right:0;bottom:0;padding:16px 16px 18px;background:linear-gradient(transparent,rgba(6,16,33,.35),rgba(6,16,33,.9));color:#fff;font-weight:800;font-size:clamp(16px,1.8vw,20px);display:flex;align-items:center;gap:9px}
  .pill .pf .hintclick{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);color:#13284b;font-size:11px;font-weight:800;padding:6px 10px;border-radius:99px}
  .pill .pb{position:absolute;inset:0;padding:clamp(18px,2.4vw,26px);background:var(--card);opacity:0;visibility:hidden;transition:opacity .5s;display:flex;flex-direction:column;justify-content:center}
  .pill.open .pf{opacity:0;visibility:hidden}
  .pill.open .pb{opacity:1;visibility:visible}
  .pill .pb .badge{width:44px;height:44px;border-radius:12px;background:var(--theme);color:#fff;display:grid;place-items:center;margin-bottom:12px}
  .pill .pb h3{margin:0 0 8px;font-size:clamp(17px,1.9vw,21px)}
  .pill .pb p{margin:0;font-size:clamp(14px,1.45vw,16px);line-height:1.55;color:#41506b}
  .pill .pb .re{margin-top:14px;font-size:12.5px;color:var(--muted);font-weight:700;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  .pill .dtick{position:absolute;top:12px;left:12px;width:24px;height:24px;border-radius:50%;background:var(--good);color:#fff;display:none;place-items:center;z-index:3}
  .pill.done .dtick{display:grid}.pill .dtick svg{width:14px;height:14px}
  .acc{display:grid;gap:8px}
  .qrow{border:1px solid var(--line);border-radius:13px;background:var(--card);overflow:hidden}
  .qrow .head{display:flex;align-items:center;gap:13px;padding:11px 16px;cursor:pointer;font-weight:700;font-size:clamp(14px,1.5vw,16px)}
  .qrow .head .q{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--theme-soft);color:var(--theme);display:grid;place-items:center;font-size:13px;font-weight:800}
  .qrow .head .chev{margin-left:auto;color:var(--muted);transition:transform .3s}
  .qrow .body{max-height:0;overflow:hidden;transition:max-height .4s;background:#fbfdff}
  .qrow .body .inner{padding:2px 16px 12px 56px;font-size:clamp(13.5px,1.45vw,15.5px);color:#41506b;line-height:1.6}
  .qrow.open{border-color:var(--theme)} .qrow.open .head .q{background:var(--theme);color:#fff}
  .qrow.open .head .chev{transform:rotate(180deg)}.qrow.open .body{max-height:460px}
  .qlist{display:grid;gap:12px}
  .qbtn{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:13px;padding:13px 16px;cursor:pointer;font-weight:700;font-size:clamp(14.5px,1.55vw,16.5px);background:#fff;transition:.16s;text-align:left;width:100%}
  .qbtn:hover{border-color:var(--theme);background:#f8fbff;transform:translateX(3px)}
  .qbtn .qi{flex:0 0 auto;width:30px;height:30px;border-radius:8px;background:var(--theme-soft);color:var(--theme);display:grid;place-items:center;font-weight:800;font-size:14px}
  .qbtn .qck{margin-left:auto;width:21px;height:21px;border-radius:50%;border:1.5px solid #c7d3e6;display:grid;place-items:center;flex:0 0 auto}
  .qbtn.seen .qck{background:var(--good);border-color:var(--good)} .qbtn .qck svg{width:12px;height:12px;color:#fff;opacity:0}.qbtn.seen .qck svg{opacity:1}
  .qbtn .chev2{color:var(--muted)}
  .qdetail{display:none}.qdetail.on{display:block;animation:slideUp .4s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .qback{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;font-size:13.5px;border-radius:9px;padding:9px 14px;cursor:pointer}
  .qbackwrap{display:flex;justify-content:flex-end;margin-top:16px}
  .qback:hover{border-color:var(--theme);color:var(--ink)}
  .qdetail .qtitle{display:flex;align-items:center;gap:13px;font-family:var(--display);font-weight:600;font-size:clamp(19px,2.3vw,26px);color:var(--ink);padding:15px 17px;background:var(--theme-soft);border-radius:13px;margin-bottom:18px}
  .qdetail .qtitle .qi{flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:var(--theme);color:#fff;display:grid;place-items:center;font-weight:800}
  .checklist{display:grid;gap:12px}
  .checklist .ci{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;opacity:0;transform:translateX(-8px);animation:ciIn .45s forwards}
  .checklist .ci .ck{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--good);color:#fff;display:grid;place-items:center}
  .checklist .ci .ck svg{width:16px;height:16px}.checklist .ci p{margin:0;font-size:clamp(15px,1.55vw,17px);line-height:1.5}
  @keyframes ciIn{to{opacity:1;transform:none}}
  .vmaster{display:grid;grid-template-columns:0.7fr 1.3fr;gap:clamp(18px,2.6vw,26px);align-items:start}
  .scene.introlock .pill,.scene.introlock .qbtn,.scene.introlock .vbtn,.scene.introlock .qrow .head,.scene.introlock .helpcard,.scene.introlock .opt,.scene.introlock [data-submit],.scene.introlock .hubcard{pointer-events:none;opacity:.5;filter:grayscale(.25);cursor:default}
  .vcontent{border:1px solid var(--line);border-radius:16px;background:#fbfdff;padding:clamp(20px,2.6vw,28px);min-height:clamp(240px,40vh,300px)}
  .vcontent .vph{color:var(--muted);font-size:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:12px}
  .vcontent .vph .vphic{width:56px;height:56px;border-radius:15px;background:var(--theme);color:#fff;display:grid;place-items:center}
  .vcontent h3{margin:0 0 14px;font-family:var(--display);font-weight:600;font-size:clamp(20px,2.3vw,25px);color:var(--ink);display:flex;align-items:center;gap:11px}
  .vcontent h3 .vi{width:38px;height:38px;border-radius:10px;background:var(--theme);color:#fff;display:grid;place-items:center;flex:0 0 auto}
  .vcontent p{margin:0 0 11px;font-size:clamp(14.5px,1.5vw,16.5px);line-height:1.62;color:#33415c}
  .vcontent.fade{animation:fadeIn .35s}
  @keyframes fadeIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
  .vlist{display:grid;gap:12px}
  .vbtn{display:flex;align-items:center;gap:13px;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;cursor:pointer;font-weight:700;font-size:clamp(14.5px,1.55vw,16.5px);background:#fff;transition:.18s;text-align:left}
  .vbtn:hover{border-color:var(--theme);transform:translateX(-4px)}
  .vbtn.active{border-color:var(--theme);background:var(--theme-soft);transform:translateX(-8px);box-shadow:var(--shadow)}
  .vbtn .vic{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--theme-soft);color:var(--theme);display:grid;place-items:center}
  .vbtn.active .vic{background:var(--theme);color:#fff}
  .vbtn .vck{margin-left:auto;width:21px;height:21px;border-radius:50%;border:1.5px solid #c7d3e6;display:grid;place-items:center;flex:0 0 auto}
  .vbtn.seen .vck{background:var(--good);border-color:var(--good)}.vbtn .vck svg{width:12px;height:12px;color:#fff;opacity:0}.vbtn.seen .vck svg{opacity:1}
  .hubgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .hubcard{border:1.5px solid var(--line);border-radius:15px;background:#fff;cursor:pointer;padding:17px 18px;display:flex;align-items:center;gap:15px;transition:.18s;position:relative;text-align:left}
  .hubcard:hover{border-color:var(--theme);transform:translateY(-2px);box-shadow:var(--shadow)}
  .hubcard .hic{flex:0 0 auto;width:48px;height:48px;border-radius:13px;background:var(--theme);color:#fff;display:grid;place-items:center}
  .hubcard h3{margin:0 0 3px;font-size:clamp(15px,1.6vw,17px)}.hubcard p{margin:0;font-size:clamp(12.5px,1.35vw,14px);color:var(--muted);line-height:1.4}
  .hubcard .hgo{margin-left:auto;color:var(--theme);flex:0 0 auto;transition:transform .2s}.hubcard:hover .hgo{transform:translateX(3px)}
  .hubcard .hck{position:absolute;top:11px;right:11px;width:23px;height:23px;border-radius:50%;background:var(--good);color:#fff;display:none;place-items:center}
  .hubcard.done .hck{display:grid}.hubcard.done .hgo{display:none}.hubcard .hck svg{width:13px;height:13px}
  .hubcard.done{border-color:color-mix(in srgb,var(--good) 40%,var(--line));background:#f4fbf7}
  .hubnote{margin-top:18px;font-size:14px;color:var(--muted);display:flex;align-items:center;gap:8px}.hubnote b{color:var(--ink)}
  .cycle{position:relative;margin:4px auto 0;max-width:660px}.cycle svg{width:100%;height:auto;display:block;overflow:visible}
  .cnode{opacity:0;transition:opacity .55s}.cnode.in{opacity:1}
  .carrow{opacity:0;stroke-dasharray:560;stroke-dashoffset:560;transition:opacity .3s,stroke-dashoffset 1s ease}.carrow.in{opacity:1;stroke-dashoffset:0}
  .cyc-cap{font-size:13.5px;color:#33415c;line-height:1.45}.cyc-cap b{color:var(--ink)}
  .scnbox{border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .scnhead{background:var(--theme);color:#fff;padding:12px 18px;font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:9px}.scnhead svg{width:17px;height:17px}
  .scngrid{display:grid;grid-template-columns:1fr 1fr}
  .scngrid .sit{padding:18px 20px;font-size:clamp(14.5px,1.5vw,16.5px);line-height:1.58;color:#33415c;border-right:1px solid var(--line)}
  .scngrid .ans{padding:16px 20px}.scngrid .qn{font-weight:800;font-size:clamp(15px,1.55vw,17px);margin-bottom:12px}
  .opts{display:grid;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;cursor:pointer;font-size:clamp(14px,1.5vw,15.5px);transition:.15s;background:#fff}
  .opt:hover{border-color:color-mix(in srgb,var(--theme) 45%,var(--line));background:#f8fbff}
  .opt .k{flex:0 0 auto;width:25px;height:25px;border-radius:50%;border:1.5px solid #c3d3ec;font-weight:800;font-size:12.5px;display:grid;place-items:center;color:var(--muted)}
  .opt.sel{border-color:var(--theme);background:var(--theme-soft)}.opt.sel .k{background:var(--theme);color:#fff;border-color:var(--theme)}
  .opt.correct{border-color:var(--good);background:#effaf4}.opt.correct .k{background:var(--good);border-color:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:#fdf1f0}.opt.wrong .k{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt.locked{pointer-events:none}
  .fbstatus{margin-top:14px;display:none;align-items:center;gap:8px;font-weight:700;font-size:clamp(14px,1.5vw,16px)}
  .fbstatus.show{display:flex}
  .fbstatus.ok{color:var(--good)}.fbstatus.no{color:var(--bad)}
  .fbstatus .fsi{flex:0 0 auto;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff}
  .fbstatus.ok .fsi{background:var(--good)}.fbstatus.no .fsi{background:var(--bad)}.fbstatus .fsi svg{width:13px;height:13px}
  .fb{margin-top:14px;border-radius:13px;padding:15px 16px;display:none;font-size:clamp(14px,1.5vw,16px);line-height:1.55;gap:13px;align-items:flex-start}
  .fb.show{display:flex}
  .fb.ok{background:#effaf4;border:1px solid #bde9d1;color:#1a6b48}.fb.no{background:#fdf1f0;border:1px solid #f2c3bf;color:#a23a32}
  .fb .fbi{flex:0 0 auto;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff}
  .fb.ok .fbi{background:var(--good)}.fb.no .fbi{background:var(--bad)}.fb .fbi svg{width:22px;height:22px}
  .fb b{display:block;margin-bottom:4px;font-size:12px;letter-spacing:.05em;text-transform:uppercase}
  .helpgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .helpcard{border:1.5px solid var(--line);border-radius:15px;background:#fff;padding:0;overflow:hidden;cursor:pointer;transition:.18s;position:relative}
  .helpcard:hover{border-color:var(--theme);box-shadow:var(--shadow)}
  .helpcard .hh{display:flex;align-items:center;gap:12px;padding:15px 17px;font-weight:800;font-size:clamp(15px,1.6vw,17px);background:var(--theme);color:#fff}
  .helpcard .hh .hhi{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.2);display:grid;place-items:center;flex:0 0 auto}
  .helpcard .hbody{max-height:0;overflow:hidden;transition:max-height .45s}
  .helpcard.open .hbody{max-height:360px}
  .helpcard .hin{padding:15px 18px}
  .helpcard .hin ul{margin:0;padding-left:20px;display:grid;gap:8px}.helpcard .hin li{font-size:clamp(14px,1.45vw,15.5px);line-height:1.5;color:#41506b}

var ETICA=[["Antisoborno y anticorrupción","No ofrecer, entregar, solicitar ni aceptar sobornos o cualquier beneficio indebido."],["Competencia leal","Competir de manera justa y no participar en prácticas comerciales ilegales."],["Bienestar animal","Cuando sea necesario utilizar animales, deberán ser tratados con respeto, minimizando el dolor y el estrés."],["Privacidad","Proteger la información confidencial de Roche, de sus colaboradores y de sus pacientes."],["Prevención de conflictos de interés","Identificar, prevenir y gestionar los conflictos de interés e informar a Roche cuando exista un conflicto real o potencial."],["Protección del producto","Contar con sistemas para proteger los productos, componentes e ingredientes contra robo, falsificación y adulteración."]];
var DDHH=[["Empleo de libre elección","Garantizar que todo trabajo sea voluntario y que los trabajadores no paguen por obtener un empleo. No utilizar trabajo forzoso, trabajo por servidumbre ni ninguna forma de esclavitud moderna."],["Trabajo infantil y trabajadores jóvenes","No utilizar trabajo infantil. La contratación de trabajadores jóvenes (menores de 18 años) solo está permitida para trabajos seguros y no peligrosos, siempre que hayan alcanzado la edad mínima legal para trabajar o hayan concluido la educación obligatoria."],["No discriminación","Tratar a todos los trabajadores de manera justa y proporcionar un ambiente de trabajo libre de discriminación."],["Trato justo","Garantizar que el ambiente de trabajo esté libre de acoso, trato severo e inhumano."],["Salarios, beneficios y horas de trabajo","Pagar a los trabajadores de manera justa, incluyendo el salario mínimo, las horas extras, los beneficios y los pagos oportunos."],["Libertad de asociación y negociación colectiva","Respetar el derecho de los trabajadores a afiliarse a un sindicato y a negociar colectivamente."],["Comunidades locales e indígenas","Respetar los derechos de las comunidades locales, incluido el derecho a un ambiente limpio y saludable."],["Abastecimiento responsable de minerales y metales","Utilizar e importar únicamente minerales y metales provenientes de fuentes responsables."]];
var MAMB=[["Cumplimiento ambiental","Cumplir toda la legislación ambiental aplicable y obtener los permisos y licencias necesarios."],["Gestión de residuos y emisiones","Gestionar, controlar y tratar adecuadamente los residuos, las aguas residuales y las emisiones para prevenir daños al medio ambiente."],["Cambio climático","Evaluar y reportar sus emisiones de gases de efecto invernadero y establecer metas de reducción de emisiones alineadas con la trayectoria de 1,5 °C (conforme al Acuerdo de París). Asimismo, fijar metas para reducir los residuos y el consumo de energía, y esforzarse por una transición hacia fuentes de energía renovable."],["Eficiencia en el uso de recursos","Reducir el consumo de recursos como el agua y la energía, reutilizando y reciclando materiales para una economía más circular."],["Conservación de la biodiversidad","Conservar la biodiversidad mediante el uso responsable de los recursos naturales y el cumplimiento de la normativa ambiental, asegurando que las operaciones no contribuyan a la deforestación."],["Prevención de derrames y liberaciones","Contar con sistemas eficaces para prevenir, controlar, mitigar y comunicar derrames o liberaciones accidentales al medio ambiente."],["Materiales peligrosos","Evitar el uso de sustancias prohibidas y eliminar progresivamente, de manera activa, las sustancias altamente preocupantes (SVHC) y las sustancias perfluoroalquiladas y polifluoroalquiladas (PFAS). Ayudar a Roche proporcionando declaraciones precisas y conformes."]];

var A={
 howtoSeq:"Observa la secuencia: primero Aprende, luego Analiza y finalmente Decide.",
 bienvenida:"Bienvenido a la autoformación sobre el Código de Conducta para Proveedores de Roche. Esta capacitación ha sido desarrollada por la Organización para fortalecer el cumplimiento de los compromisos asumidos como proveedor de Roche. Durante los próximos minutos conocerás los principios y comportamientos que Roche espera de cada uno de nosotros. Asimismo, te ayudará a identificar situaciones que pueden presentarse durante tu trabajo y a tomar decisiones alineadas con los valores de Roche y de nuestra Organización. Cuando estés listo, inicia la capacitación.",
 howto:"Antes de comenzar, es importante conocer cómo se desarrollará esta capacitación. Durante el curso encontrarás principios, recomendaciones y situaciones basadas en casos que podrían presentarse en la prestación de servicios para Roche. Analiza cada situación antes de responder y reflexiona sobre cuál sería la mejor decisión.",
 toc:"Este es el índice del curso. En el menú superior verás tu avance: cada módulo se marca con un check al completarlo.",
 introDiv:"En este módulo conocerás por qué Roche cuenta con un Código de Conducta para Proveedores y la importancia de cumplirlo durante la prestación de servicios.",
 objetivos:"Al finalizar esta capacitación, comprenderás por qué Roche establece un Código de Conducta para sus proveedores. Identificarás los principios y comportamientos esperados durante la prestación de servicios para Roche. Aplicarás estos principios para actuar correctamente frente a las situaciones que puedan presentarse en el desarrollo de tus funciones. Estos conocimientos contribuirán a que desempeñes tus funciones con integridad, responsabilidad y de acuerdo con las expectativas establecidas por Roche.",
 sost:"Roche está comprometida con la sostenibilidad en todas sus actividades y espera que sus proveedores compartan ese mismo compromiso. Como proveedor, desempeñamos un papel importante para contribuir al crecimiento sostenible de Roche, actuando con responsabilidad, integridad y altos estándares de comportamiento. A continuación, te invitamos a conocer los tres compromisos que reflejan este enfoque y que constituyen la base de las expectativas establecidas para sus proveedores. Haz clic en cada compromiso para conocer su contenido.",
 sInnov:"Innovación. Contribuir al desarrollo de soluciones que mejoren la salud y la calidad de vida de las personas.",
 sPers:"Personas. Promover un entorno donde todas las personas sean tratadas con respeto, equidad y dignidad.",
 sAmb:"Medio Ambiente. Desarrollar actividades de manera responsable, protegiendo el medio ambiente y usando los recursos de forma sostenible.",
 prov:"La relación de Roche con sus proveedores va más allá de una relación comercial. Roche considera que sus proveedores son aliados fundamentales para alcanzar un crecimiento sostenible y generar un impacto positivo en la sociedad. A continuación, te invitamos a explorar cuatro preguntas que te ayudarán a comprender esta relación y las expectativas que Roche establece para sus proveedores. Selecciona cada pregunta para continuar.",
 q1:"Roche considera como proveedores a las empresas que suministran bienes, prestan servicios o actúan como fabricantes por contrato. Todas ellas forman parte de su cadena de suministro y deben cumplir los principios establecidos en este Código de Conducta.",
 q2:"Nuestra colaboración contribuye a un negocio más eficiente y sostenible, y a que Roche pueda ofrecer innovaciones médicas que beneficien a los pacientes y a la sociedad.",
 q3:"Roche espera que todos sus proveedores cumplan las expectativas y principios establecidos en su Código de Conducta. Este compromiso forma parte de la relación comercial y constituye un requisito para mantener una colaboración responsable y sostenible.",
 q4:"Cumplir este Código te permitirá comprender las expectativas de Roche, contribuir a proteger la reputación de nuestra organización y fortalecer la relación comercial que mantenemos como proveedor de Roche.",
 codDiv:"Hasta este momento, conociste el propósito del Código de Conducta para Proveedores de Roche, el compromiso de Roche con la sostenibilidad y la importancia de la colaboración con sus proveedores. A continuación, en este módulo, conocerás los valores fundamentales y los principios que orientan el comportamiento esperado de los proveedores que forman parte de su cadena de suministro.",
 valores:"Los valores fundamentales de Roche son Cumplimiento, Responsabilidad y Transparencia. Selecciona cada uno para conocer su significado e importancia.",
 vCumpl:"El cumplimiento del Código de Conducta para Proveedores forma parte de los compromisos asumidos entre Roche y nuestra Organización y constituye un requisito para participar en el Proyecto Roche. Todos los colaboradores que desarrollan actividades para este proyecto deben actuar conforme a estos principios. Los incumplimientos deben ser corregidos oportunamente y, cuando sean graves, pueden afectar la continuidad de la relación comercial entre Roche y nuestra Organización.",
 vResp:"Nuestra Organización debe promover el cumplimiento de los principios del Código de Conducta para Proveedores de Roche a lo largo de su cadena de suministro. Esto implica que, cuando corresponda, nuestros proveedores y socios comerciales también desarrollen sus actividades de acuerdo con estos principios.",
 vTrans:"Nuestra Organización debe mantener la información y los registros necesarios para demostrar el cumplimiento del Código de Conducta para Proveedores de Roche. Cuando corresponda, Roche podrá verificar este cumplimiento mediante auditorías, evaluaciones u otros mecanismos establecidos para este fin.",
 principios:"El Código de Conducta para Proveedores de Roche se desarrolla a través de siete principios fundamentales. Cada uno de ellos establece expectativas específicas sobre la forma en que debemos desarrollar nuestras actividades. En las siguientes secciones, revisaremos cada principio y analizaremos situaciones prácticas relacionadas con ellos. Selecciona cada principio para conocer su alcance.",
 etica:"Actuar con ética significa desarrollar nuestras actividades con integridad, transparencia y respeto por las normas aplicables. Este principio comprende seis temas fundamentales. Selecciona cada tema para conocer su alcance.",
 ddhh:"Respetar los derechos humanos y laborales significa promover un entorno de trabajo digno, seguro, inclusivo y respetuoso. Este principio comprende ocho temas fundamentales. Selecciona cada tema para conocer su alcance.",
 seguridad:"Roche espera que sus proveedores proporcionen un entorno de trabajo seguro y saludable para todas las personas. Esto implica mantener condiciones de trabajo seguras, proteger la salud y el bienestar de los trabajadores, gestionar adecuadamente los riesgos asociados a los procesos y contar con planes eficaces de preparación y respuesta ante situaciones de emergencia.",
 mamb:"Roche promueve un compromiso ambiental verificable y de mejora continua. Este principio comprende siete temas. Selecciona cada tema para conocer su alcance.",
 gobernanza:"Roche espera que sus proveedores cuenten con sistemas de gestión que permitan implementar estos principios de manera consistente: cultura de cumplimiento, gestión preventiva de riesgos, procesos transparentes y trazables, capacitación del personal, mejora continua y reporte oportuno de incumplimientos.",
 propiedad:"Roche espera que todos sus proveedores respeten los derechos de propiedad intelectual asociados a sus productos, tecnologías, procesos, marcas y demás activos intangibles. Asimismo, toda la información confidencial y los secretos comerciales a los que se tenga acceso durante la relación comercial deben protegerse adecuadamente y utilizarse únicamente para los fines autorizados. El uso, la divulgación o la reproducción no autorizados de esta información pueden afectar la confianza entre las partes y generar responsabilidades legales y contractuales.",
 sosteco:"Roche espera que sus proveedores contribuyan al desarrollo sostenible de las comunidades donde operan. Esto implica desarrollar las actividades empresariales de manera responsable, generando valor económico y social y manteniendo una relación positiva con las comunidades en las que participan. La sostenibilidad no solo comprende el desempeño económico de la empresa, sino también el impacto que sus actividades generan en las personas y en su entorno.",
 cierreDiv:"Hasta aquí conociste los valores fundamentales y los principios del Código. A continuación conocerás cómo actuar ante posibles incumplimientos, los canales para comunicar inquietudes y las consecuencias del incumplimiento.",
 ayuda:"Si tienes dudas sobre la forma correcta de actuar o necesitas comunicar una posible situación de incumplimiento, puedes acudir a las siguientes instancias. Selecciona cada cuadro para conocerlas.",
 ay1:"Internamente puedes acudir a tu jefe inmediato o a la persona con quien te sientas cómodo para plantear la situación, y al área responsable de Cumplimiento o Recursos Humanos.",
 ay2:"O cuando corresponda, puedes acudir al contacto de Compras de Roche, al Compliance Officer de Roche o al Canal Speak Up de Roche.",
 consec:"El cumplimiento de este Código forma parte de los compromisos con Roche. Cuando un proveedor no cumple las expectativas establecidas, deberá implementar de inmediato medidas correctivas debidamente documentadas. En caso de incumplimientos graves, Roche podrá dar por terminada la relación comercial y excluir al proveedor de futuras oportunidades de contratación.",
 comp:"Por eso contamos contigo. Tu compromiso con estos principios es fundamental. Permite a Roche ofrecer innovaciones médicas a los pacientes con integridad y contribuye a que toda su cadena de valor opere de manera responsable. Juntos podemos impulsar la sostenibilidad, fortalecer la confianza mutua y crear un futuro más saludable para todos. Gracias por formar parte de este compromiso.",
 recursos:"Has finalizado esta capacitación. Los recursos presentados permanecerán disponibles para consultarlos cuando lo necesites.",
 esc:"Lee el escenario y responde cómo deberías actuar frente a esta situación.",
 fbEtica:"“Aceptar cualquier beneficio que pueda influir en una decisión, ya que constituye un riesgo para la integridad y es contrario a las expectativas del Código de Conducta para Proveedores de Roche”.",
 fbDDHH:"“El Código exige igualdad de oportunidades, cumplimiento de la legislación laboral y respeto por los derechos humanos”.",
 fbMamb:"“Roche promueve la mejora continua y el compromiso verificable con sus expectativas ambientales”."
};

function onPlaybackEnd(){if(P.ended)return;P.ended=true;P.playing=false;setPlayIcon(false);if(P.raf)cancelAnimationFrame(P.raf);renderProgress(1);P.offset=0;P.onTick=null;heard[P.key]=true;updateSeekLock();if(SLIDES[idx]&&P.key===SLIDES[idx].k){var _sc=scenes[idx];if(_sc)_sc.classList.remove("introlock");}tryComplete(idx);var cb=P.onEnd;P.onEnd=null;if(cb)setTimeout(cb,220);}
function play(){audioUnlocked=true;primeAudio();if(P.playing){pausePlayback();return;}if(!P.decided){P.pendingPlay=true;return;}P.ended=false;if(P.mode==='webaudio')startWeb(P.offset);else if(P.mode==='audio')startAudio();else startTTS(P.offset);}
function speak(key,text,onEnd){prepare(key,text,onEnd);play();}
playBtn.addEventListener('click',play);setPlayIcon(false);volIcon();
function seekTo(x){if(RESTRICT&&!isHeard())return;var r0=seek.getBoundingClientRect();var r=(x-r0.left)/r0.width;r=Math.max(0,Math.min(1,r));if(P.mode==='webaudio'){P.offset=r*(P.buffer?P.buffer.duration:P.est);if(P.playing)startWeb(P.offset);else renderProgress(r);}else if(P.mode==='audio'){try{AU.currentTime=r*(AU.duration||0);}catch(e){}renderProgress(r);}else{P.offset=wordSnap(r*P.len);if(P.playing){startTTS(P.offset);}else{P.startRatio=P.offset/Math.max(1,P.len);renderProgress(r);}}}
var seeking=false;seek.addEventListener('mousedown',function(e){if(RESTRICT&&!isHeard())return;seeking=true;seekTo(e.clientX);});window.addEventListener('mousemove',function(e){if(seeking)seekTo(e.clientX);});window.addEventListener('mouseup',function(){seeking=false;});seek.addEventListener('touchstart',function(e){seekTo(e.touches[0].clientX);},{passive:true});seek.addEventListener('touchmove',function(e){seekTo(e.touches[0].clientX);},{passive:true});
var volTimer=null;volEl.addEventListener('input',function(){P.vol=parseInt(volEl.value,10)/100;volIcon();if(P.mode==='webaudio'){if(GAIN)GAIN.gain.value=P.vol;}else if(P.mode==='audio'){AU.volume=P.vol;}else if(P.playing){clearTimeout(volTimer);volTimer=setTimeout(function(){var el=(performance.now()-P.startTime)/1000;var r=Math.min(0.999,P.startRatio+el/Math.max(0.1,P.est));startTTS(wordSnap(r*P.len));},220);}});
volBtn.addEventListener('click',function(){if(P.vol>0){P._prev=P.vol;P.vol=0;volEl.value=0;}else{P.vol=P._prev||1;volEl.value=Math.round(P.vol*100);}volIcon();if(P.mode==='webaudio'){if(GAIN)GAIN.gain.value=P.vol;}else if(P.mode==='audio'){AU.volume=P.vol;}else if(P.playing){var el=(performance.now()-P.startTime)/1000;var r=Math.min(0.999,P.startRatio+el/Math.max(0.1,P.est));startTTS(wordSnap(r*P.len));}});
ccBtn.addEventListener('click',function(){P.ccOn=!P.ccOn;transcript.classList.toggle('on',P.ccOn);ccBtn.classList.toggle('on',P.ccOn);});
/* ===== INTERACCIONES (con auto-avance secuencial) ===== */
function wire(scene,i){
  if(scene.dataset.wired)return;scene.dataset.wired='1';var s=SLIDES[i];
  if(s.type==='pillars')wirePillars(scene,i,s);
  if(s.type==='acc')wireAcc(scene,i,s);
  if(s.type==='qmaster')wireQMaster(scene,i,s);
  if(s.type==='vmaster')wireVMaster(scene,i,s);
  if(s.type==='ayuda')wireHelp(scene,i,s);
  if(s.type==='hub')wireHub(scene,i);
  if(s.type==='scenario')wireScenario(scene,i,s);
  if(s.type==='toc')buildTOC(scene);
  var cb=scene.querySelector('#certBtn');if(cb)cb.addEventListener('click',genCert);
}
function nextUnheard(keys){for(var k=0;k<keys.length;k++){if(!heard[keys[k]])return k;}return -1;}
function audioKeys(i){var s=SLIDES[i];if(s.type==='howto')return s.k2?[s.k,s.k2]:[s.k];if(s.type==='pillars')return s.cards.map(function(c){return c.k;});if(s.type==='qmaster'||s.type==='vmaster')return s.items.map(function(it){return it.k;});if(s.type==='acc')return s.qs.map(function(q){return q.k;});if(s.type==='ayuda')return s.boxes.map(function(b){return b.k;});return s.audio?[s.k]:[];}
function audiosHeard(i){return audioKeys(i).every(function(k){return heard[k];});}
function tryComplete(i){if(i==null||i<0)return;if(!slideDone[i]&&isReady(i)){markSlide(i);}else if(i===idx){refreshNav();}}
function wirePillars(scene,i,s){
  var pills=scene.querySelectorAll('.pill'),keys=s.cards.map(function(c){return c.k;});
  function openP(k){var p=pills[k];if(!p)return;p.classList.add('open');speak(s.cards[k].k,s.cards[k].audio,function(){p.classList.add('done');});}
  pills.forEach(function(p){var k=parseInt(p.dataset.pi,10);if(heard[keys[k]])p.classList.add('done');p.addEventListener('click',function(){openP(k);});});
  scene.querySelectorAll('.pill .re').forEach(function(r){r.addEventListener('click',function(e){e.stopPropagation();r.closest('.pill').classList.remove('open');stopPlayback();});});
}
function wireAcc(scene,i,s){
  var rows=scene.querySelectorAll('[data-acc] .qrow'),keys=s.qs.map(function(q){return q.k;});
  function openR(k){var row=rows[k];if(!row)return;rows.forEach(function(r){r.classList.remove('open');});row.classList.add('open');var q=s.qs[k];speak(q.k,row.querySelector('.head').textContent.trim()+'. '+row.querySelector('.inner').textContent.trim(),null);row.scrollIntoView({block:'nearest'});}
  rows.forEach(function(row){row.querySelector('.head').addEventListener('click',function(e){if(e.target.closest('a'))return;var k=parseInt(row.dataset.ai,10);if(row.classList.contains('open')){row.classList.remove('open');stopPlayback();return;}openR(k);});});
}
function qmToList(scene){var d=scene.querySelector('[data-qdetail]');if(!d)return;d.classList.remove('on');var l=scene.querySelector('[data-qlist]');if(l)l.style.display='';var ld=scene.querySelector('[data-qlead]');if(ld)ld.style.display='';}
function wireQMaster(scene,i,s){
  var listEl=scene.querySelector('[data-qlist]'),detail=scene.querySelector('[data-qdetail]'),lead=scene.querySelector('[data-qlead]'),btns=scene.querySelectorAll('.qbtn'),keys=s.items.map(function(it){return it.k;});
  function openI(k){var it=s.items[k];scene.querySelector('[data-qdi]').textContent=(k+1);scene.querySelector('[data-qdq]').textContent=it.q;scene.querySelector('[data-qdlist]').innerHTML=it.points.map(function(p,ix){return '<div class="ci" style="animation-delay:'+(ix*0.12)+'s"><span class="ck">'+svg('check',16)+'</span><p>'+p+'</p></div>';}).join('');listEl.style.display='none';if(lead)lead.style.display='none';detail.classList.add('on');speak(it.k,it.audio,function(){btns[k].classList.add('seen');qmToList(scene);});}
  btns.forEach(function(b){var k=parseInt(b.dataset.qi,10);if(heard[keys[k]])b.classList.add('seen');b.addEventListener('click',function(){openI(k);});});
  scene.querySelector('[data-qback]').addEventListener('click',function(){qmToList(scene);stopPlayback();});
}
function wireVMaster(scene,i,s){
  var cont=scene.querySelector('[data-vcontent]'),btns=scene.querySelectorAll('.vbtn'),keys=s.items.map(function(it){return it.k;});
  function openV(k){var it=s.items[k];btns.forEach(function(x){x.classList.remove('active');});btns[k].classList.add('active');cont.classList.remove('fade');void cont.offsetWidth;cont.classList.add('fade');cont.innerHTML='<h3><span class="vi">'+svg(it.icon,18)+'</span>'+it.h+'</h3>'+it.paras.map(function(p){return '<p>'+p+'</p>';}).join('');speak(it.k,it.audio,function(){btns[k].classList.add('seen');});}
  btns.forEach(function(b){var k=parseInt(b.dataset.vi,10);if(heard[keys[k]])b.classList.add('seen');b.addEventListener('click',function(){openV(k);});});
}
function wireHelp(scene,i,s){
  var cards=scene.querySelectorAll('.helpcard'),keys=s.boxes.map(function(b){return b.k;});
  function openB(k){var c=cards[k];if(!c)return;c.classList.add('open');speak(s.boxes[k].k,s.boxes[k].audio,function(){var nx=nextUnheard(keys);if(nx>=0)openB(nx);});}
  cards.forEach(function(c){c.addEventListener('click',function(e){if(e.target.closest('a'))return;openB(parseInt(c.dataset.hi,10));});});
}
function wireScenario(scene,i,s){
  var opts=scene.querySelectorAll('[data-opts] .opt'),submit=scene.querySelector('[data-submit]'),fb=scene.querySelector('[data-fb]'),sel=null;
  opts.forEach(function(o){o.addEventListener('click',function(){if(o.classList.contains('locked'))return;opts.forEach(function(x){x.classList.remove('sel');});o.classList.add('sel');sel=o;submit.disabled=false;});});
  submit.addEventListener('click',function(){if(!sel)return;opts.forEach(function(o){o.classList.add('locked');if(o.dataset.correct==='1')o.classList.add('correct');});var ok=sel.dataset.correct==='1';if(!ok)sel.classList.add('wrong');var st=scene.querySelector('[data-fbstatus]');st.classList.remove('ok','no');st.classList.add('show');st.classList.add(ok?'ok':'no');st.querySelector('[data-fsicon]').innerHTML=svg(ok?'check':'x',13);st.querySelector('[data-fstext]').textContent=ok?'Tu respuesta fue correcta':'Tu respuesta fue incorrecta';fb.classList.remove('ok','no');fb.classList.add('show');fb.classList.add(ok?'ok':'no');scene.querySelector('[data-fbicon]').innerHTML=svg(s.fbIcon||'eye',22);scene.querySelector('[data-fbt]').textContent=s.fbTitle;scene.querySelector('[data-fbm]').textContent='\u201c'+s.fb+'\u201d';var audioMsg=ok?('Tu manera de actuar fue la correcta. De lo contrario, '+s.fbTitle+' \u201c'+s.fb+'\u201d.'):(s.fbTitle+' \u201c'+s.fb+'\u201d.');submit.style.display='none';if(ok){speak(s.k+'-correcta',audioMsg,null);}else{speak(s.fbk,audioMsg,null);}markSlide(i);});
}
function wireHub(scene,i){scene.querySelectorAll('.hubcard').forEach(function(c){c.addEventListener('click',function(){var p=c.dataset.p;var t=principleFirst[p];if(t!==undefined)show(t);});});refreshHub(scene);}
function refreshHub(scene){scene=scene||scenes[HUB];if(!scene)return;scene.querySelectorAll('.hubcard').forEach(function(c){c.classList.toggle('done',!!principleDone[c.dataset.p]);});var n=PRINCIPLES.filter(function(p){return principleDone[p];}).length;var el=scene.querySelector('[data-hubcount]');if(el)el.innerHTML='<b>'+n+' de 7</b> principios completados'+(n===7?' — puedes continuar.':'.');}
/* ===== CHECKS ===== */
function markSlide(i){slideDone[i]=true;var s=SLIDES[i];if(s.sec&&lastSlideOfSec[s.sec]===i)secDone[s.sec]=true;if(s.plast&&s.principle){principleDone[s.principle]=true;if(allPrinciplesDone())secDone.prin=true;refreshHub();}Object.keys(MODSECS).forEach(function(k){if(MODSECS[k].every(function(x){return secDone[x];}))modDone[k]=true;});if(i===idx)refreshNav();refreshMenu();refreshTOC();updateOverall();}
function updateOverall(){var pct=Math.round(slideDone.filter(Boolean).length/SLIDES.length*100);document.getElementById('cprogFill').style.width=pct+'%';if(window.SCORM)SCORM.setProgress(pct);}
/* ===== TOC ===== */
function buildTOC(scene){var g=scene.querySelector('#tocGrid');if(!g)return;var groups=[{k:'intro',n:'01',t:'Introducción',secs:[['obj','Objetivos'],['sost','Compromiso de Roche con la sostenibilidad'],['prov','Roche y sus proveedores']]},{k:'cod',n:'02',t:'Código de Conducta',secs:[['val','Valores fundamentales de Roche'],['prin','Principios del Código de Conducta']],sub:['Ética','Derechos Humanos y Laborales','Seguridad y Salud','Medio Ambiente','Gobernanza y Sistemas de Gestión','Propiedad Intelectual','Sostenibilidad Económica']},{k:'cierre',n:'03',t:'Cierre',secs:[['ayuda','Buscar ayuda y comunicar inquietudes'],['cons','Consecuencias del incumplimiento'],['comp','Compromiso con Roche'],['rec','Recursos']]}];g.innerHTML=groups.map(function(gr){var secs=gr.secs.map(function(sc){var extra='';if(sc[0]==='prin'&&gr.sub){extra='<div style="margin:6px 0 2px 26px;display:grid;gap:5px">'+gr.sub.map(function(name){return '<div style="display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted)"><span style="width:6px;height:6px;border-radius:50%;background:'+TH[gr.k].c+';flex:0 0 auto"></span>'+name+'</div>';}).join('')+'</div>';}return '<div class="toc-sec" data-sec="'+sc[0]+'" style="display:flex;gap:9px;align-items:center;font-size:13px;color:var(--muted);font-weight:600"><span class="tocdot" style="width:17px;height:17px;border-radius:50%;border:1.5px solid #c3d3ec;display:grid;place-items:center;flex:0 0 auto"></span>'+sc[1]+'</div>'+extra;}).join('');return '<div class="card" style="box-shadow:none;border-color:var(--line)"><div style="padding:18px"><span style="width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:800;background:'+TH[gr.k].c+'">'+gr.n+'</span><h3 style="margin:10px 0 8px;font-size:16px">'+gr.t+'</h3><div style="display:grid;gap:6px">'+secs+'</div></div></div>';}).join('');refreshTOC();}
function refreshTOC(){document.querySelectorAll('.toc-sec').forEach(function(r){var d=r.querySelector('.tocdot');if(secDone[r.dataset.sec]){d.style.background='var(--good)';d.style.borderColor='var(--good)';d.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';}});}
/* ===== CERTIFICADO ===== */
function genCert(){var name=(window.SCORM&&SCORM.studentName())||'Participante';var cv=document.createElement('canvas');cv.width=1200;cv.height=850;var x=cv.getContext('2d');x.fillStyle='#0c1b33';x.fillRect(0,0,1200,850);x.fillStyle='#13284b';x.fillRect(40,40,1120,770);x.strokeStyle='#5FA83D';x.lineWidth=4;x.strokeRect(60,60,1080,730);x.textAlign='center';x.fillStyle='#fff';x.font='bold 30px Arial';x.fillText('CERTIFICADO DE PARTICIPACIÓN',600,175);x.fillStyle='#9fb6dd';x.font='16px Arial';x.fillText('Se otorga el presente certificado a',600,265);x.fillStyle='#fff';x.font='bold 46px Georgia';x.fillText(name,600,335);x.fillStyle='#9fb6dd';x.font='16px Arial';x.fillText('por completar la capacitación',600,405);x.fillStyle='#7fd3ff';x.font='bold 26px Arial';x.fillText('Código de Conducta para Proveedores de Roche',600,455);x.fillStyle='#9fb6dd';x.font='15px Arial';var d=new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'});x.fillText('Fecha de finalización: '+d,600,555);x.fillStyle='#5FA83D';x.beginPath();x.arc(600,655,42,0,7);x.fill();x.strokeStyle='#fff';x.lineWidth=6;x.beginPath();x.moveTo(582,655);x.lineTo(596,670);x.lineTo(620,640);x.stroke();x.fillStyle='#6b7ea0';x.font='13px Arial';x.fillText('Capacitación interna · Proveedor de Roche',600,755);var a=document.createElement('a');a.download='Certificado_Codigo_Conducta_Roche.png';a.href=cv.toDataURL('image/png');a.click();}
/* ===== NAVEGACIÓN ===== */
function gateType(i){return SLIDES[i].gate||'0';}
function isReady(i){if(!RESTRICT)return true;var s=SLIDES[i];if(s.hub)return allPrinciplesDone();if(s.type==='scenario')return !!slideDone[i]&&(!s.audio||!!heard[s.k]);return audiosHeard(i);}
function nextIndex(cur){var s=SLIDES[cur];if(s.hub)return(!RESTRICT||allPrinciplesDone())?navTarget.cierre:-1;if(s.plast)return HUB;if(s.principle)return cur+1;var n=cur+1;return n<SLIDES.length?n:-1;}
function prevIndex(cur){var s=SLIDES[cur];if(s.principle)return cur===principleFirst[s.principle]?HUB:cur-1;if(s.hub)return cur-1;if(cur>0&&SLIDES[cur-1].principle)return HUB;return cur-1;}
function runSequence(scene,i){var items=scene.querySelectorAll('[data-seq] > *');items.forEach(function(el){el.classList.remove('in');});items.forEach(function(el,k){setTimeout(function(){if(scenes[idx]===scene)el.classList.add('in');},300+k*600);});}
var CYCSEQ=[['cn-aprende'],['ca-1','cn-analiza'],['ca-2','cn-decide'],['ca-3']];
function cycleReveal(scene,k){var g=CYCSEQ[k];if(!g)return;g.forEach(function(id){var e=scene.querySelector('#'+id);if(e)e.classList.add('in');});}
function resetCycle(scene,i){var s=SLIDES[i],all=scene.querySelectorAll('.cnode,.carrow');if(s.k2&&heard[s.k2]){all.forEach(function(e){e.classList.add('in');});}else{all.forEach(function(e){e.classList.remove('in');});}}
function runCycleSync(scene,i){var s=SLIDES[i];if(!s.k2||scenes[idx]!==scene)return;var txt=s.audio2||'',L=Math.max(1,txt.length);
  var cues=['Aprende','Analiza','Decide'].map(function(w){var q=txt.indexOf(w);return q<0?1:q/L;});
  scene.querySelectorAll('.cnode,.carrow').forEach(function(e){e.classList.remove('in');});
  var done=[false,false,false];function rev(k){if(done[k])return;done[k]=true;cycleReveal(scene,k);}
  speak(s.k2,txt,function(){P.onTick=null;rev(0);rev(1);rev(2);cycleReveal(scene,3);});
  P.onTick=function(r){for(var k=0;k<3;k++){if(r>=cues[k])rev(k);}};}
function show(i){
  stopPlayback();idx=i;if(i>maxReached)maxReached=i;var s=SLIDES[i];applyTheme(s.mod);
  scenes.forEach(function(sc,k){sc.classList.toggle('active',k===i);});
  wire(scenes[i],i);if(s.hub)refreshHub(scenes[i]);if(s.type==='qmaster')qmToList(scenes[i]);
  prepare(s.k,s.audio||'',(s.type==='howto'&&s.k2)?function(){runCycleSync(scenes[i],i);}:null);
  var _LK=['pillars','qmaster','vmaster','acc','ayuda','scenario','hub'];
  scenes[i].classList.toggle('introlock',RESTRICT&&_LK.indexOf(s.type)>=0&&!!s.audio&&!heard[s.k]&&audioUnlocked);
  if(s.type==='howto'){resetCycle(scenes[i],i);}
  else if(gateType(i)==='seq'){runSequence(scenes[i],i);}
  if(audioUnlocked&&s.audio)play();
  document.getElementById('sceneLabel').textContent='Escena '+(i+1)+' de '+SLIDES.length;
  refreshMenu();refreshNav();updateOverall();scenes[i].scrollTop=0;
  if(s.type==='recursos'){if(window.SCORM){SCORM.complete();}var sm=document.getElementById('scormMsg');if(sm)sm.textContent=(window.SCORM&&SCORM.isConnected())?'✓ Progreso enviado al LMS.':'';}
}
function refreshNav(){var prev=document.getElementById('prevBtn'),next=document.getElementById('nextBtn');var pi=prevIndex(idx);prev.disabled=(pi<0||idx===0);var ready=isReady(idx),ni=nextIndex(idx),last=(SLIDES[idx].type==='recursos');next.disabled=last||ni<0||!ready;next.style.visibility=last?'hidden':'visible';var hint=document.getElementById('hint'),ht=document.getElementById('hintTxt');if(!ready&&!last){var sc=SLIDES[idx],msg;if(scenes[idx]&&scenes[idx].classList.contains('introlock'))msg='Escucha la introducción para habilitar las opciones';else if(sc.hub)msg='Completa los 7 principios para continuar';else if(sc.type==='scenario')msg='Responde el escenario para continuar';else if(['pillars','qmaster','vmaster','acc','ayuda'].indexOf(sc.type)>=0)msg='Escucha el audio de cada elemento para continuar';else msg='Escucha el audio completo para continuar';ht.textContent=msg;hint.classList.add('show');}else hint.classList.remove('show');if(SLIDES[idx].type==='cover')next.innerHTML='Comenzar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>';else if(!last)next.innerHTML='Siguiente <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>';}
document.getElementById('nextBtn').addEventListener('click',function(){audioUnlocked=true;if(this.disabled)return;var ni=nextIndex(idx);if(ni>=0)show(ni);});
document.getElementById('prevBtn').addEventListener('click',function(){var pi=prevIndex(idx);if(pi>=0)show(pi);});
document.addEventListener('keydown',function(e){if(e.target.closest('input,textarea'))return;var n=document.getElementById('nextBtn'),p=document.getElementById('prevBtn');if(e.key==='ArrowRight'&&!n.disabled)n.click();if(e.key==='ArrowLeft'&&!p.disabled)p.click();if(e.key===' '){e.preventDefault();play();}});
buildMenu();show(0);
</script>
